name: ci
on:
  push: { branches: ["main"] }
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run c:ptau
      - run: npm run c:compile
      - run: npm run c:setup
      - run: npm run c:export
      - run: mkdir -p contracts/src/zk && cp circuits/artifacts/Verifier.sol contracts/src/zk/Verifier.sol
      - uses: actions/upload-artifact@v4
        with:
          name: verifier-sol
          path: contracts/src/zk/Verifier.sol
      - uses: actions/upload-artifact@v4
        with:
          name: circuits-public
          path: circuits/build/public.json

  solidity:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: verifier-sol
          path: contracts/src/zk
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: latest }
      - run: forge build -q
      - run: forge test -vv

  e2e:
    runs-on: ubuntu-latest
    needs: [prepare, rust, solidity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: verifier-sol
          path: contracts/src/zk
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: latest }
      - name: Start anvil
        run: ./devnet/start.sh
      - name: Deploy
        run: forge script devnet/Deploy.s.sol --rpc-url http://127.0.0.1:8545 --broadcast -vv | tee /tmp/deploy.log
      - name: Capture addresses
        run: tail -n 50 /tmp/deploy.log | grep '{"verifier"' > devnet/deploy.json
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: node circuits/mkinput.js devnet/out/abi.bin
      - run: npm run c:prove
      - name: E2E submit
        run: ./devnet/e2e.sh
      - name: Stop anvil
        if: always()
        run: ./devnet/stop.sh
