name: CI

on:
  push:
    branches: [main, restore-project]
  pull_request:
    branches: [main, restore-project]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  npm-audit:
    name: NPM Audit (INF-003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities in dev dependencies — review before mainnet"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test

  bench:
    name: Rust Benchmarks (compile-only)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-
      - name: Compile benchmarks (no-run)
        run: cargo bench --no-run -p worldline-benches

  solidity:
    name: Solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Compile contracts
        run: npx hardhat compile
      - name: Contract tests
        run: npx hardhat test

  canonical-conformance:
    name: Canonical JSON Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── TypeScript conformance ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: TypeScript canonical JSON conformance
        run: |
          npx ts-node --project tsconfig.json -e "
          const { canonicalJson, canonicalKeccak } = require('./scripts/canonical-json');
          const fs = require('fs');
          const vectors = JSON.parse(fs.readFileSync('schemas/canonical-test-vectors.json', 'utf-8'));
          let pass = 0, fail = 0;
          for (const v of vectors) {
            const got = canonicalJson(v.input);
            if (got !== v.canonical) {
              console.error('FAIL [' + v.description + ']: expected ' + v.canonical + ' got ' + got);
              fail++;
            } else {
              const hash = canonicalKeccak(v.input);
              if (hash.toLowerCase() !== v.keccak256.toLowerCase()) {
                console.error('FAIL hash [' + v.description + ']: expected ' + v.keccak256 + ' got ' + hash);
                fail++;
              } else {
                pass++;
              }
            }
          }
          console.log('TypeScript canonical conformance: ' + pass + ' passed, ' + fail + ' failed');
          if (fail > 0) process.exit(1);
          "

      # ── Rust conformance ────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Rust canonical JSON conformance (via cargo test)
        run: cargo test -p worldline-registry -- canonical::tests::shared_test_vectors

  foundry-fuzz:
    name: Foundry Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Compile (Foundry)
        run: forge build
      - name: Fuzz tests
        run: forge test --match-contract Fuzz -v

  zk-setup-verify:
    name: ZK Setup Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install circom 2.1.6
        run: |
          curl -sL https://github.com/iden3/circom/releases/download/v2.1.6/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
          circom --version
      - name: Compile circuit
        run: npm run c:compile
      - name: Download ptau (with integrity check)
        run: npm run c:ptau
      - name: Run full ceremony (dev mode)
        run: npm run c:setup
      - name: Verify final zkey exists
        run: |
          if [ ! -f circuits/artifacts/worldline_stf_final.zkey ]; then
            echo "ERROR: worldline_stf_final.zkey not found after c:setup"
            exit 1
          fi
          echo "worldline_stf_final.zkey exists ✓"
      - name: Verify zkey independently
        run: npm run c:setup:verify
      - name: Confirm snarkjs is pinned (no caret/tilde)
        run: |
          VERSION=$(node -e "console.log(require('./package.json').devDependencies.snarkjs)")
          if echo "$VERSION" | grep -qE '[\^~]'; then
            echo "ERROR: snarkjs version is not pinned: $VERSION"
            exit 1
          fi
          echo "snarkjs pinned to $VERSION ✓"

  devnet-smoke:
    name: Devnet Smoke Test
    runs-on: ubuntu-latest
    needs: [solidity]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry (Anvil)
        uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Compile contracts
        run: npx hardhat compile
      - name: Start Anvil
        run: |
          anvil --port 8545 --chain-id 31337 >/tmp/anvil.log 2>&1 &
          echo "Anvil PID: $!"
      - name: Wait for Anvil
        run: |
          for i in $(seq 1 30); do
            if cast block-number --rpc-url http://127.0.0.1:8545 2>/dev/null; then
              echo "Anvil ready after ${i}s"
              exit 0
            fi
            echo "Waiting for Anvil… ($i/30)"
            sleep 1
          done
          echo "Anvil failed to start. Log:"
          cat /tmp/anvil.log
          exit 1
      - name: Devnet smoke test
        run: npm run devnet:smoke
        env:
          SKIP_ANVIL_LAUNCH: "1"
