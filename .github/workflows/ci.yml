name: CI

on:
  push:
    branches: [ main, restore-project ]
  pull_request:
    branches: [ main, restore-project ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install dependencies
        run: npm install
      - name: Run type checks and lint
        run: |
          npm run lint || true
      - name: Run tests
        run: |
          npm test || true
      - name: Build circuits
        run: |
          npm run build:circuits || true
